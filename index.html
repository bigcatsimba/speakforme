<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Speak for Me</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: rgba(255,255,255,0.1);
      --border-focus: rgba(62,207,160,0.4);
      --accent: #3ecfa0;
      --accent-gradient: linear-gradient(135deg, #3ecfa0 0%, #2aa881 100%);
      --text: #ffffff;
      --text-sub: #aaaaaa;
      --text-trust: #888888;
      --f: 'Inter', system-ui, -apple-system, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--f);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .app-container {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Header */
    .header { text-align: center; }
    h1 {
      font-size: clamp(34px, 5vw, 56px);
      font-weight: 700;
      letter-spacing: -0.04em;
      color: #ffffff;
      margin-bottom: 10px;
      line-height: 1.15;
    }
    .sub {
      font-size: clamp(16px, 2vw, 20px);
      color: var(--text-sub);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .trust {
      font-size: clamp(13px, 1.5vw, 16px);
      color: var(--text-trust);
      letter-spacing: 0.01em;
    }

    /* Input card */
    .input-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 20px 52px 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transition: border-color 0.2s;
      cursor: text;
    }
    .input-card:focus-within {
      border-color: var(--border-focus);
    }
    textarea {
      width: 100%;
      min-height: clamp(150px, 20vh, 220px);
      background: transparent;
      color: #ffffff;
      border: none;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.45;
      resize: none;
      outline: none;
      font-family: var(--f);
      -webkit-tap-highlight-color: transparent;
    }
    textarea::-webkit-scrollbar { width: 0; }
    textarea::placeholder { color: #444; }

    .card-footer {
      position: absolute;
      bottom: 16px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }
    .char-count, .btn-clear { pointer-events: auto; }
    .char-count {
      font-size: clamp(13px, 1.5vw, 16px);
      color: #888;
      font-variant-numeric: tabular-nums;
    }
    .btn-clear {
      background: transparent;
      border: none;
      color: #666;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: var(--f);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
    }
    .btn-clear:hover { color: #f43f5e; }

    /* Speak button */
    .btn-speak {
      width: 100%;
      background: var(--accent-gradient);
      color: #020a07;
      border: none;
      border-radius: 16px;
      padding: 19px;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.01em;
      cursor: pointer;
      font-family: var(--f);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(62,207,160,0.2);
    }
    .btn-speak:active { transform: scale(0.975); }
    .btn-speak:hover { opacity: 0.92; }
    .btn-speak.speaking {
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(62,207,160,0.5);
      box-shadow: none;
    }

    /* Language selector */
    .lang-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 4px 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      align-self: center;
    }
    .lang-label {
      font-size: clamp(12px, 1.2vw, 14px);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #888;
      white-space: nowrap;
      padding-left: 6px;
    }
    .lang-select-wrap {
      position: relative;
      flex: 1;
    }
    select {
      width: 100%;
      background: transparent;
      color: #ddd;
      border: none;
      font-size: clamp(14px, 1.5vw, 16px);
      font-weight: 500;
      outline: none;
      cursor: pointer;
      font-family: var(--f);
      padding: 10px 28px 10px 8px;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      -webkit-tap-highlight-color: transparent;
    }
    select:focus { color: var(--accent); }
    .select-arrow {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: #888;
      font-size: 10px;
    }

    /* Footer */
    footer { text-align: center; }
    .bmac {
      font-size: clamp(13px, 1.5vw, 16px);
      color: #888;
      text-decoration: none;
      transition: color 0.15s;
    }
    .bmac:hover { color: #aaa; }
  @media (min-width: 768px) {
      body { padding: 48px 32px; }
      .app-container { gap: 28px; }
      textarea { font-size: 24px; }
      .btn-speak { padding: 22px; font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="app-container">

  <header class="header">
    <h1>Lost your voice?</h1>
    <p class="sub">Type anything. Your phone does the talking.</p>
    <p class="trust">Free &middot; No sign-up &middot; Works instantly</p>
  </header>

  <main>
    <div class="input-card" id="cardContainer">
      <textarea id="txt" placeholder="Type here…" maxlength="300" oninput="onInput()" autofocus></textarea>
      <div class="card-footer">
        <span class="char-count" id="charCount">0 / 300</span>
        <button class="btn-clear" onclick="clearAll(event)">Clear</button>
      </div>
    </div>
  </main>

  <button class="btn-speak" id="speakBtn" onclick="speak()">Speak</button>

  <div class="lang-wrap">
    <span class="lang-label">Language</span>
    <div class="lang-select-wrap">
      <select id="langSel">
        <option value="en-US">English</option>
        <option value="zh-CN">中文（普通话）</option>
        <option value="es-ES">Español</option>
        <option value="fr-FR">Français</option>
        <option value="de-DE">Deutsch</option>
        <option value="ja-JP">日本語</option>
        <option value="ko-KR">한국어</option>
        <option value="pt-BR">Português</option>
      </select>
      <span class="select-arrow">▼</span>
    </div>
  </div>

  <footer>
    <a class="bmac" href="https://buymeacoffee.com/roomymate" target="_blank" rel="noopener">
      If this helped, buy me a coffee ☕
    </a>
  </footer>

</div>

<script>
  const synth = window.speechSynthesis;
  let voices = [];

  function loadVoices() {
    if (!synth) return;
    voices = synth.getVoices();
  }

  if (synth) {
    loadVoices();
    if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
    setTimeout(loadVoices, 300);
  }

  document.getElementById('cardContainer').addEventListener('click', function(e) {
    if (!e.target.classList.contains('btn-clear')) {
      document.getElementById('txt').focus();
    }
  });

  function onInput() {
    document.getElementById('charCount').textContent = document.getElementById('txt').value.length + ' / 300';
  }

  function getBestVoice(lang) {
    if (!voices.length) loadVoices();
    const langCode = lang.split('-')[0];
    let pool = voices.filter(v => v.lang.replace('_','-') === lang);
    if (!pool.length) pool = voices.filter(v => v.lang.startsWith(langCode));
    if (!pool.length) return null;
    return pool[0];
  }

  function setSpeaking(on) {
    const btn = document.getElementById('speakBtn');
    btn.textContent = on ? 'Stop' : 'Speak';
    btn.classList.toggle('speaking', on);
  }

  function speak() {
    if (!synth) return;
    if (synth.speaking) { synth.cancel(); setSpeaking(false); return; }

    const text = document.getElementById('txt').value.trim();
    if (!text) return;

    const lang  = document.getElementById('langSel').value;
    const voice = getBestVoice(lang);
    const utt   = new SpeechSynthesisUtterance(text);
    utt.lang = lang;
    utt.rate = 0.95;
    if (voice) utt.voice = voice;

    utt.onstart = () => setSpeaking(true);
    utt.onend   = () => setSpeaking(false);
    utt.onerror = (e) => { if (e.error !== 'interrupted') setSpeaking(false); };

    synth.speak(utt);
  }

  function clearAll(e) {
    if (e) e.stopPropagation();
    document.getElementById('txt').value = '';
    document.getElementById('charCount').textContent = '0 / 300';
    if (synth) synth.cancel();
    setSpeaking(false);
  }
</script>

</body>
</html>
